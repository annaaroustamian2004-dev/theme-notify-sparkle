<html lang="en" class="dark">

    <meta charset="UTF-8" />

    <meta name="description" content="Real-time air quality and weather monitoring for Philadelphia." />

      crossorigin=""
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme") || "dark";
          var h = document.documentElement;
          h.classList.remove("light", "dark");
          h.classList.add(t);
        } catch (e) {}
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
